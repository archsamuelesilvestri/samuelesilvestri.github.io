  * {
    box-sizing: border-box;
  }

  html {
    height: 100%;
  }

  body {
    margin: 0;
    background: #fff;
    font-family: Helvetica Neue, Arial, sans-serif;
    height: var(--app-height, 100vh);
    display: flex;
    flex-direction: column;
  }
  
  /* Intro fade */
  #intro {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 1;
    transition: opacity 1.5s ease;
  }

  #intro-text {
    font-family: Helvetica Neue, Arial, sans-serif;
    font-size: 1em;
    color: #000;
    text-align: center;
    opacity: 0;
    transition: opacity 1.5s ease;
  }

  /* ================= DESKTOP ================= */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: var(--app-height, 100vh);
    overflow: hidden;
    flex: 1;
  }

  .side-column {
    padding: 40px 40px;
    box-sizing: border-box;
    font-size: 12px;
    color: #666;
    text-align: left;
  }

  .counter {
    font-size: 14px;
    letter-spacing: 1px;
    margin-bottom: 10px;
    text-align: left;
  }

  .caption {
    font-size: 10pt;
    color: rgba(0,0,0,0.5);
    line-height: 1.4;
    text-align: left;
  }

  .slideshow-wrapper {
    position: relative;
    padding: 40px 40px 40px 10px;
    box-sizing: border-box;
    height: 100%;
    overflow: hidden;
  }

  .slideshow {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.8s ease;
    object-fit: contain;
    object-position: right center;
  }

  .slide.loaded {
    opacity: 1;
  }

  .info-box {
    position: fixed;
    bottom: 40px;
    left: 40px;
    width: 350px;
    font-size: 10pt;
    color: rgba(0,0,0,0.5);
    line-height: 1.4;
    text-align: left;
    pointer-events: none;
  }

  /* Orizzontali desktop: in alto a destra */
  @media (min-width: 769px) {
    .slide.horizontal {
      object-position: right top;
    }
  }

  /* ================= MOBILE ================= */
  @media (max-width: 768px) {
    body {
      overflow: hidden;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: var(--app-height, 100vh);
    }

    .layout {
      display: flex;
      flex-direction: column;
      flex: 1;
      height: auto;
      min-height: 0;
      overflow: hidden;
    }

    .side-column {
      display: none !important;
    }

    /* Info mobile (dati + didascalie) */
    .mobile-info-wrapper {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px 18px;
      pointer-events: auto;
      box-sizing: border-box;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }

    .mobile-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .mobile-data {
      font-size: 12px;
      line-height: 1.3;
      flex: 1;
    }

    .mobile-data .extra-info {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      color: rgba(0,0,0,0.6);
    }

    .mobile-caption {
      font-size: 11px;
      line-height: 1.3;
      text-align: right;
      opacity: 0.75;
    }

    .counter-mobile {
      font-size: 15px;
      margin-bottom: 6px;
      text-align: right;
    }

    /* Slideshow occupa tutto lo spazio rimanente */
    .slideshow-wrapper {
      flex: 1;
      position: relative;
      padding: 12px;
      min-height: 0;
      overflow: hidden;
    }

    .slideshow {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
