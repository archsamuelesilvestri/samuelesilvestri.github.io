<!DOCTYPE html>
<html lang="it">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FW1ER2Y7QD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FW1ER2Y7QD');
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samuele Silvestri Architetto</title>
  <meta name="description" content="Samuele Silvestri, Architetto, Modena. Contatti: info@samuelesilvestriarchitetto.com">
  <link rel="icon" href="images/logo.png" type="image/png">

<style>
  body {
    margin: 0;
    background: #fff;
    font-family: Helvetica Neue, Arial, sans-serif;

    /* FIX iPhone */
    height: 100vh;
    height: 100dvh;

    overflow-x: hidden;
  }

  /* INTRO */
  #intro {
    position: fixed;
    inset: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    opacity: 1;
    transition: opacity 1.5s ease;
  }

  #intro-text {
    font-size: 1em;
    color: #000;
    text-align: center;
    opacity: 0;
    transition: opacity 1.5s ease;
  }

  /* DESKTOP */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;

    height: 100vh;
    height: 100dvh;

    overflow: hidden;
  }

  .side-column {
    padding: 40px;
    font-size: 12px;
    color: #666;
  }

  .counter {
    font-size: 14px;
    margin-bottom: 10px;
  }

  .caption {
    font-size: 10pt;
    color: rgba(0,0,0,0.5);
    line-height: 1.4;
  }

  .slideshow-wrapper {
    position: relative;
    padding: 40px 40px 40px 10px;

    /* SAFE AREA iPhone */
    padding-top: calc(40px + env(safe-area-inset-top));
    padding-bottom: calc(40px + env(safe-area-inset-bottom));
  }

  .slideshow {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1.8s ease;
    object-fit: contain;
    object-position: right center;
  }

  .slide.loaded {
    opacity: 1;
  }

  .info-box {
    position: fixed;
    bottom: calc(40px + env(safe-area-inset-bottom));
    left: calc(40px + env(safe-area-inset-left));
    width: 350px;
    font-size: 10pt;
    color: rgba(0,0,0,0.5);
    line-height: 1.4;
    pointer-events: none;
  }

  @media (min-width: 769px) {
    .slide.horizontal {
      object-position: right top;
    }
  }

  /* MOBILE */
  @media (max-width: 768px) {
    body {
      display: flex;
      flex-direction: column;
    }

    .layout {
      display: flex;
      flex-direction: column;
      flex: 1;
      height: 100%;
    }

    .side-column {
      display: none;
    }

    .mobile-info-wrapper {
      display: flex;
      justify-content: space-between;
      padding: 0 18px calc(18px + env(safe-area-inset-bottom)) 18px;
      pointer-events: none;
    }

    .mobile-data {
      font-size: 12px;
      max-width: 45%;
      cursor: pointer;
      pointer-events: auto;
    }

    .mobile-data .extra-info {
      display: none;
    }

    .mobile-data.expanded .extra-info {
      display: block;
    }

    .mobile-caption {
      font-size: 11px;
      text-align: right;
      opacity: 0.75;
      max-width: 50%;
    }

    .counter-mobile {
      font-size: 15px;
      margin-bottom: 6px;
    }

    .slideshow-wrapper {
      flex: 1;
      padding: 18px;

      padding-top: calc(18px + env(safe-area-inset-top));
    }

    .slide.vertical {
      object-fit: cover;
      object-position: center top;
    }

    .slide.horizontal {
      object-fit: cover; /* migliorato per iPhone grandi */
      object-position: center;
    }

    .info-box {
      display: none;
    }
  }

  @media (min-width: 769px) {
    .mobile-info-wrapper {
      display: none;
    }
  }
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div id="intro-text"><strong>samuelesilvestri</strong>architetto</div>
</div>

<div class="layout">

  <div class="side-column">
    <div class="counter" id="counter">1</div>
    <div class="caption" id="caption"></div>
  </div>

  <div class="slideshow-wrapper">
    <div class="slideshow" id="slideshow">

      <!-- immagini -->
      <img src="images/1.webp" class="slide vertical">
      <img src="images/2b.webp" class="slide horizontal">
      <img src="images/15.webp" class="slide vertical">
      <img src="images/3.webp" class="slide vertical">
      <img src="images/19.webp" class="slide horizontal">
      <img src="images/18.webp" class="slide horizontal">
      <img src="images/20.webp" class="slide horizontal">
      <img src="images/4.webp" class="slide vertical">
      <img src="images/5.webp" class="slide vertical">
      <img src="images/6.webp" class="slide vertical">
      <img src="images/7.webp" class="slide horizontal">
      <img src="images/8.webp" class="slide vertical">
      <img src="images/9.webp" class="slide vertical">
      <img src="images/10.webp" class="slide vertical">
      <img src="images/11a.webp" class="slide vertical">
      <img src="images/11.webp" class="slide vertical">
      <img src="images/12.webp" class="slide vertical">
      <img src="images/13.webp" class="slide horizontal">
      <img src="images/14.webp" class="slide horizontal">
      <img src="images/16.webp" class="slide horizontal">

    </div>
  </div>
</div>

<!-- INFO DESKTOP -->
<div class="info-box">
  <!-- testo invariato -->
  <strong>Samuele Silvestri</strong><br>
  Architetto<br>
  Modena, Italia<br>
  arch.samuelesilvestri@gmail.com<br>
  +39 366 493 8286
</div>

<!-- INFO MOBILE -->
<div class="mobile-info-wrapper">
  <div class="mobile-data" onclick="this.classList.toggle('expanded')">
    <strong>Samuele Silvestri</strong><br>
    Architetto<br>
    <span class="extra-info">
      Modena, Italia<br>
      info@samuelesilvestriarchitetto.com<br>
      +39 366 493 8286
    </span>
  </div>

  <div class="mobile-caption">
    <div class="counter-mobile" id="counter-mobile">1</div>
    <div id="caption-mobile"></div>
  </div>
</div>

<script>
  const slides = document.querySelectorAll('.slide');
  const counter = document.getElementById('counter');
  const caption = document.getElementById('caption');
  const counterMobile = document.getElementById('counter-mobile');
  const captionMobile = document.getElementById('caption-mobile');

  const captions = ["Slide 1","Slide 2","Slide 3"]; // ridotto per esempio

  let current = 0;

  function showSlide(i){
    slides.forEach(s => s.classList.remove('loaded'));
    slides[i].classList.add('loaded');

    counter.textContent = i + 1;
    caption.innerHTML = captions[i] || "";

    counterMobile.textContent = i + 1;
    captionMobile.innerHTML = captions[i] || "";

    current = i;
  }

  function nextSlide(){
    showSlide((current + 1) % slides.length);
  }

  window.addEventListener('load', () => {
    showSlide(0);
    setInterval(nextSlide, 4000);
  });
</script>

<script>
  window.addEventListener('load', () => {
    const intro = document.getElementById('intro');
    const text = document.getElementById('intro-text');

    setTimeout(() => text.style.opacity = '1', 100);

    setTimeout(() => {
      text.style.opacity = '0';
      intro.style.opacity = '0';
    }, 2000);

    setTimeout(() => {
      intro.style.display = 'none';
    }, 3500);
  });
</script>

</body>
</html>
