<title>Samuele Silvestri Architetto</title>

<style>

/* BASE */
body {
  margin: 0;
  background: #fff;
  font-family: Helvetica Neue, Arial, sans-serif;

  height: 100vh;
  height: 100dvh;

  overflow-x: hidden;
}

/* INTRO */
#intro {
  position: fixed;
  inset: 0;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 1.5s ease;
}

#intro-text {
  opacity: 0;
  transition: opacity 1.5s ease;
}

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;

  height: 100vh;
  height: 100dvh;
}

/* SIDEBAR */
.side-column {
  padding: 40px;
  font-size: 12px;
  color: #666;
}

.counter {
  font-size: 14px;
  margin-bottom: 10px;
}

.caption {
  font-size: 10pt;
  color: rgba(0,0,0,0.5);
  line-height: 1.4;
}

/* SLIDESHOW */
.slideshow-wrapper {
  position: relative;
  padding: 40px 40px 40px 10px;

  padding-top: calc(40px + env(safe-area-inset-top));
  padding-bottom: calc(40px + env(safe-area-inset-bottom));
}

.slideshow {
  position: relative;
  width: 100%;
  height: 100%;
}

.slide {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1.5s ease;

  object-fit: contain;
  object-position: right center;
}

.slide.active {
  opacity: 1;
}

/* INFO DESKTOP */
.info-box {
  position: fixed;
  bottom: calc(40px + env(safe-area-inset-bottom));
  left: calc(40px + env(safe-area-inset-left));
  width: 350px;
  font-size: 10pt;
  color: rgba(0,0,0,0.5);
  line-height: 1.4;
  pointer-events: none;
}

/* MOBILE */
@media (max-width: 768px) {

.layout {
  display: flex;
  flex-direction: column;
}

.side-column {
  display: none;
}

.mobile-info-wrapper {
  display: flex;
  justify-content: space-between;
  padding: 0 18px calc(18px + env(safe-area-inset-bottom)) 18px;
}

.mobile-data {
  font-size: 12px;
  max-width: 45%;
  cursor: pointer;
}

.mobile-data .extra {
  display: none;
}

.mobile-data.open .extra {
  display: block;
}

.mobile-caption {
  font-size: 11px;
  text-align: right;
  opacity: 0.75;
  max-width: 50%;
}

.slideshow-wrapper {
  flex: 1;
  padding: 18px;
  padding-top: calc(18px + env(safe-area-inset-top));
}

.slide.vertical {
  object-fit: cover;
}

.slide.horizontal {
  object-fit: cover;
}

.info-box {
  display: none;
}

}

@media (min-width: 769px) {
.mobile-info-wrapper {
  display: none;
}
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div id="intro-text"><strong>samuelesilvestri</strong>architetto</div>
</div>

<div class="layout">

<!-- DESKTOP -->
<div class="side-column">
  <div class="counter" id="counter"></div>
  <div class="caption" id="caption"></div>
</div>

<!-- SLIDES -->
<div class="slideshow-wrapper">
<div class="slideshow" id="slideshow">

<img src="images/1.webp" class="slide vertical" data-caption="Anita<br>Bar e ristorante<br>Modena<br>2025">
<img src="images/2b.webp" class="slide horizontal" data-caption="Anita<br>Bar e ristorante<br>Modena<br>2025">
<img src="images/15.webp" class="slide vertical" data-caption="Anita<br>Bar e ristorante<br>Modena<br>2025">
<img src="images/3.webp" class="slide vertical" data-caption="Anita<br>Bar e ristorante<br>Modena<br>2025">
<img src="images/19.webp" class="slide horizontal" data-caption="Cielo<br>Ceramica<br>2026">
<img src="images/18.webp" class="slide horizontal" data-caption="Cielo<br>Ceramica<br>2026">
<img src="images/20.webp" class="slide horizontal" data-caption="Casalgrande<br>Villa<br>2026">
<img src="images/4.webp" class="slide vertical" data-caption="Casa AD<br>Modena<br>2025">
<img src="images/5.webp" class="slide vertical" data-caption="Casa AD<br>Modena<br>2025">
<img src="images/6.webp" class="slide vertical" data-caption="Alberi<br>Titanio<br>2022">
<img src="images/7.webp" class="slide horizontal" data-caption="Alberi<br>Titanio<br>2022">
<img src="images/8.webp" class="slide vertical" data-caption="Alberi<br>Titanio<br>2022">
<img src="images/9.webp" class="slide vertical" data-caption="Spazio Persona<br>Fano<br>2025">
<img src="images/10.webp" class="slide vertical" data-caption="Spazio Persona<br>Fano<br>2025">

</div>
</div>
</div>

<!-- MOBILE INFO -->
<div class="mobile-info-wrapper">
  <div class="mobile-data" onclick="this.classList.toggle('open')">
    <strong>Samuele Silvestri</strong><br>
    Architetto
    <div class="extra">
      Modena<br>
      info@samuelesilvestriarchitetto.com
    </div>
  </div>

  <div class="mobile-caption">
    <div id="counter-mobile"></div>
    <div id="caption-mobile"></div>
  </div>
</div>

<script>

const slides = document.querySelectorAll('.slide');
const caption = document.getElementById('caption');
const counter = document.getElementById('counter');
const captionMobile = document.getElementById('caption-mobile');
const counterMobile = document.getElementById('counter-mobile');

let i = 0;

function show(n){
  slides.forEach(s => s.classList.remove('active'));
  slides[n].classList.add('active');

  const text = slides[n].dataset.caption;

  caption.innerHTML = text;
  captionMobile.innerHTML = text;

  counter.textContent = n + 1;
  counterMobile.textContent = n + 1;

  i = n;
}

function next(){
  show((i + 1) % slides.length);
}

window.onload = () => {
  show(0);
  setInterval(next, 4000);

  // intro
  const intro = document.getElementById('intro');
  const text = document.getElementById('intro-text');

  setTimeout(() => text.style.opacity = 1, 100);

  setTimeout(() => {
    text.style.opacity = 0;
    intro.style.opacity = 0;
  }, 2000);

  setTimeout(() => intro.remove(), 3500);
};

</script>
